services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recalls
      POSTGRES_USER: recalls_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recalls_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recalls_user -d recalls"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Override with Railway/hosted Postgres: DATABASE_URL=postgresql://user:pass@host:5432/db?sslmode=require
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://recalls_user:${POSTGRES_PASSWORD:-recalls_dev_password}@db:5432/recalls}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-google}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
      INGESTION_SCHEDULE_HOURS: ${INGESTION_SCHEDULE_HOURS:-6}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
